# Build and push the Docker image to Docker Hub and GitHub Container Registry (GHCR).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  — Docker Hub user or org name
#   DOCKERHUB_TOKEN     — Docker Hub access token (not your account password)
#
# GHCR uses the workflow GITHUB_TOKEN; this job sets permissions.packages: write.
# After the first push, set the ghcr.io package visibility under the repo/org Packages
# settings if you want public pulls without authentication.
#
# Docker Hub login also allows pulling a private base image (e.g. ubuntu-development).
#
# schedule: GitHub Actions cron is UTC (e.g. Mondays 06:00 UTC).

name: Build and push Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  DOCKERHUB_IMAGE: vergissberlin/apigee-hybride-development

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set GHCR image name (lowercase)
        run: echo "IMAGE_NAME_GHCR=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: latest on default branch, semver on v* — no branch-name tag (e.g. main).
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME_GHCR }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
